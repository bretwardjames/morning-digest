<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Digest Feedback{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            max-width: 480px;
            margin: 0 auto;
            padding: 20px 16px;
            background: #fafafa;
            color: #222;
        }
        h1 { font-size: 1.3rem; margin-bottom: 4px; }
        .subtitle { color: #666; font-size: 0.85rem; margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin: 16px 0 6px; font-size: 0.95rem; }
        .hint { color: #888; font-size: 0.8rem; margin-bottom: 6px; }
        input[type="text"], textarea {
            width: 100%; padding: 10px; border: 1px solid #ccc;
            border-radius: 6px; font-size: 1rem; font-family: inherit;
        }
        textarea { min-height: 80px; resize: vertical; }
        .radio-group, .check-group { display: flex; flex-wrap: wrap; gap: 8px; margin: 6px 0; }
        .radio-group label, .check-group label {
            display: flex; align-items: center; gap: 6px;
            font-weight: normal; margin: 0; padding: 8px 14px;
            border: 1px solid #ddd; border-radius: 20px; cursor: pointer;
            font-size: 0.9rem; background: #fff;
        }
        .radio-group input:checked + span,
        .check-group input:checked + span { font-weight: 600; }
        .radio-group label:has(input:checked),
        .check-group label:has(input:checked) {
            border-color: #333; background: #f0f0f0;
        }
        input[type="radio"], input[type="checkbox"] { width: 18px; height: 18px; }
        .rating-group { display: flex; gap: 4px; margin: 6px 0; }
        .rating-group label {
            display: flex; align-items: center; justify-content: center;
            width: 40px; height: 40px; border: 1px solid #ddd; border-radius: 8px;
            cursor: pointer; font-weight: normal; margin: 0; background: #fff;
        }
        .rating-group label:has(input:checked) {
            border-color: #333; background: #222; color: #fff;
        }
        .rating-group input { display: none; }
        button {
            width: 100%; padding: 14px; margin-top: 24px;
            background: #222; color: #fff; border: none; border-radius: 8px;
            font-size: 1.05rem; font-weight: 600; cursor: pointer;
        }
        button:active { background: #444; }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
